# 数据库名称
spring.application.name=synpharm-backend

# 数据库配置
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/synpharm?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=password

# Redis 配置
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.database=0
spring.data.redis.timeout=3000

# JWT 配置
jwt.secret=SynPharmSecretKey2024ForJWTTokenGeneration
jwt.expiration=86400000

# 服务端口
server.port=8080

# MyBatis Plus 配置
mybatis-plus.mapper-locations=classpath*:/mapper/**/*.xml
mybatis-plus.type-aliases-package=com.synpharm.model.entity
mybatis-plus.configuration.map-underscore-to-camel-case=true
